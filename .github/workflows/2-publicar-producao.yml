name: 2 - Publicar em Produção

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch de origem para publicar"
        required: true
        default: "develop"
        type: choice
        options:
          - develop

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge da branch de homologação na produção
        run: |
          git fetch origin ${{ inputs.source_branch }}
          git merge --no-ff --no-edit origin/${{ inputs.source_branch }}

      - name: Push para main
        run: git push origin main
