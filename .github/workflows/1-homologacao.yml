name: 1 - Testar Mudanças (Homologação)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch para validar"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - main

jobs:
  validar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/petshop?schema=public
      AUTH_SESSION_SECRET: test-secret-with-32-characters-minimum
      DEFAULT_COMPANY_SLUG: default
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
